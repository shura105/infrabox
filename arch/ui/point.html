<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrabox — Point</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/point.css">
</head>

<body x-data="pointApp()" x-init="init()">

    <header>
        <a class="back" @click.prevent="goBack()" href="index.html">← Back</a>
        <h1 x-text="title"></h1>
        <div class="status" :class="{'status-loading': status.startsWith('Loading')}" x-text="status"></div>
    </header>

    <!-- POINT INFO -->
    <div class="point-info" x-show="points.length > 0">
        <template x-for="p in points" :key="p.id">
            <span x-text="`${p.pointname} (${p.id}) | ${p.object} / ${p.system} | ${p.unit}`"></span>
        </template>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="period">
            <label>From:</label>
            <input type="datetime-local" x-model="fromDt">
            <label>To:</label>
            <input type="datetime-local" x-model="toDt">
            <button @click="loadArchive()">Load archive</button>
            <button @click="loadCurrent()">Current</button>
        </div>

        <div class="view-toggle">
            <button @click="exportCSV()">Export CSV</button>
            <button @click="printTable()">Print</button>
        </div>
    </div>

    <!-- ZOOM + POINT BUTTONS (chart only) -->
    <div class="chart-toolbar" x-show="view === 'chart'">
        <div class="zoom-controls">
            <button @click="zoomOut()">−</button>
            <button @click="zoomIn()">+</button>
        </div>
        <div class="point-buttons" x-show="points.length > 1">
            <template x-for="p in points" :key="p.id">
                <span class="point-btn-group" :class="{'active-group': activePointId === p.id}">
                    <button :class="{active: activePointId === p.id}" @click="setActive(p.id)" x-text="p.pointname"></button>
                    <input type="checkbox" :checked="pointVisible[p.id]" @change="toggleVisible(p.id)">
                </span>
            </template>
        </div>
    </div>

    <!-- VIEW TOOLBAR (chart/table toggle) — above both chart and table, right-aligned -->
    <div class="view-toolbar">
        <button :class="{active: view === 'chart'}" @click="view = 'chart'">Chart</button>
        <button :class="{active: view === 'table'}" @click="view = 'table'">Table</button>
    </div>

    <!-- CHART -->
    <div x-show="view === 'chart'" class="chart-container">
        <canvas id="pointChart"></canvas>
    </div>

    <!-- TABLE -->
    <div x-show="view === 'table'" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <template x-for="p in points" :key="p.id">
                        <th x-text="`${p.pointname}${p.unit ? ', ' + p.unit : ''}`"></th>
                    </template>
                </tr>
            </thead>
            <tbody>
                <template x-for="row in tableRows()" :key="row.ts">
                    <tr>
                        <td x-text="formatDate(row.ts)"></td>
                        <td x-text="formatTime(row.ts)"></td>
                        <template x-for="(val, i) in row.values" :key="i">
                            <td x-text="val !== null ? val : '—'"></td>
                        </template>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.x.x/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/point.js"></script>
</body>

</html>
