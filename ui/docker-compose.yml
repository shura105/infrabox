services:

  backend:
    build: ./backend
    container_name: infrabox-backend
    restart: unless-stopped
    networks:
      - infrabox-net
    environment:
      REDIS_HOST: infrabox-redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/app
      - ./data:/app/data

  web:
    build: ./frontend
    container_name: infrabox-web
    restart: unless-stopped
    networks:
      - infrabox-net
    ports:
      - "80:80"     # HTTP → redirect to HTTPS
      - "443:443"   # HTTPS — єдина зовнішня точка входу
    volumes:
      - ./frontend/html:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf

networks:
  infrabox-net:
    external: true
