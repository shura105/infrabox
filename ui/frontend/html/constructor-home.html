<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrabox — Конструктор</title>
    <script>window.REQUIRED_ROLE = "admin";</script>
    <script src="/auth.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }
        .logo { font-size: 16px; font-weight: 600; color: #58a6ff; text-decoration: none; }
        .hdr-right { display: flex; align-items: center; gap: 12px; }
        .hdr-user { font-size: 12px; color: #8b949e; }
        .btn {
            padding: 5px 14px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn:hover { background: #30363d; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #e6edf3;
            margin-bottom: 8px;
            letter-spacing: -.3px;
        }
        .page-sub {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 40px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 860px;
            width: 100%;
        }

        .card {
            width: 260px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 28px 24px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: border-color .15s, background .15s, transform .15s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-2px);
        }
        .card.disabled {
            opacity: .5;
            cursor: default;
            pointer-events: none;
        }
        .card-icon { font-size: 36px; line-height: 1; }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
        }
        .card-desc {
            font-size: 13px;
            color: #8b949e;
            line-height: 1.5;
        }
        .card-badge {
            margin-top: 6px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            background: #21262d;
            color: #8b949e;
            align-self: flex-start;
        }
        .card-badge.active {
            background: #1c3a5e;
            color: #58a6ff;
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="/">⬡ Infrabox</a>
    <div class="hdr-right">
        <span class="hdr-user" id="headerUser"></span>
        <a class="btn" href="/">← Головна</a>
        <button class="btn" onclick="authLogout()">Вийти</button>
    </div>
</header>

<main>
    <div class="page-title">Конструктор</div>
    <div class="page-sub">Оберіть напрямок конструювання</div>

    <div class="cards">

        <a class="card" href="/constructor-screens">
            <div class="card-icon">🖥</div>
            <div class="card-title">Структура і екрани</div>
            <div class="card-desc">
                Побудова структури екранів, налаштування елементів відображення,
                навігація між екранами.
            </div>
            <div class="card-badge active">Активно</div>
        </a>

        <a class="card disabled" href="/constructor-equipment">
            <div class="card-icon">⚙</div>
            <div class="card-title">Обладнання</div>
            <div class="card-desc">
                Конфігурація обладнання, прив'язка точок до фізичних пристроїв
                та каналів зв'язку.
            </div>
            <div class="card-badge">В розробці</div>
        </a>

    </div>
</main>

<script>
document.getElementById("headerUser").textContent =
    authUser().display_name || authUser().role;
</script>
</body>
</html>
