<!DOCTYPE html>
<html lang="uk" x-data="app()" :class="theme" x-cloak>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrabox</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        [x-cloak]{display:none!important}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        /* ── CSS variables ── */
        :root {
            --bg:       #0d1117;
            --bg2:      #161b22;
            --bg3:      #21262d;
            --border:   #30363d;
            --text:     #c9d1d9;
            --text-dim: #8b949e;
            --accent:   #58a6ff;
            --hdr-h:    52px;
            --ftr-h:    28px;
        }
        html.light {
            --bg:       #f6f8fa;
            --bg2:      #ffffff;
            --bg3:      #eaeef2;
            --border:   #d0d7de;
            --text:     #1f2328;
            --text-dim: #57606a;
            --accent:   #0969da;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            font-size: 13px;
        }
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ── header ── */
        header {
            height: var(--hdr-h);
            flex-shrink: 0;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            position: relative;
            z-index: 100;
        }
        .hdr-logo {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -.3px;
            white-space: nowrap;
            text-decoration: none;
        }
        .hdr-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
        .hdr-breadcrumb {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 0;
            overflow: hidden;
        }
        .hdr-back {
            display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            font-size: 15px;
            flex-shrink: 0;
            transition: background .12s;
        }
        .hdr-back:hover { background: var(--border); }
        .hdr-screen {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hdr-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .hdr-clock {
            text-align: right;
            line-height: 1.3;
        }
        .hdr-clock .time {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            letter-spacing: .5px;
        }
        .hdr-clock .date {
            font-size: 11px;
            color: var(--text-dim);
        }
        .btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background .12s;
        }
        .btn:hover { background: var(--border); }

        /* ── user menu ── */
        .user-wrap { position: relative; }
        .hdr-user {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: background .12s, border-color .12s;
        }
        .hdr-user:hover { background: var(--bg3); border-color: var(--border); }
        .hdr-user .u-icon {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }
        .hdr-user .u-name { color: var(--text); font-weight: 500; }

        /* ── settings menu ── */
        .settings-wrap { position: relative; }
        .settings-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg3);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            transition: background .12s, color .12s;
        }
        .settings-btn:hover { background: var(--border); color: var(--text); }
        .settings-drop {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 190px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
            padding: 6px 0;
            z-index: 200;
        }
        .sdrop-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 14px;
            cursor: pointer;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            transition: background .1s;
        }
        .sdrop-item:hover { background: var(--bg3); }
        .sdrop-icon { font-size: 15px; width: 18px; text-align: center; color: var(--text-dim); }
        .sdrop-sep { height: 1px; background: var(--border); margin: 5px 0; }
        .toggle-wrap {
            display: flex; align-items: center; gap: 9px;
            padding: 8px 14px; cursor: pointer;
            color: var(--text); font-size: 13px;
        }
        .toggle-wrap:hover { background: var(--bg3); }
        .toggle {
            position: relative;
            width: 34px; height: 18px;
            flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
        .toggle-track {
            position: absolute; inset: 0;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 9px;
            transition: background .2s;
        }
        .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
        .toggle-thumb {
            position: absolute;
            top: 2px; left: 2px;
            width: 12px; height: 12px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: transform .2s, background .2s;
        }
        .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: #fff; }

        /* ── main ── */
        main {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        #canvas-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ── canvas ── */
        .cv-wrap { position: relative; flex-shrink: 0; }
        #cv {
            position: relative;
            transform-origin: top left;
            box-shadow: 0 4px 24px rgba(0,0,0,.5);
        }
        /* element styles (same as constructor) */
        .c-el { position: absolute; }
        .r-label { position: absolute; inset: 0; display: flex; align-items: center; overflow: hidden; }
        .r-value {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: stretch;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 4px;
            background: rgba(0,0,0,.25);
            overflow: hidden;
        }
        .r-value .vl { font-size: 11px; color: var(--text-dim); flex-shrink: 0; margin-bottom: 1px; }
        .r-value .vrow { display: flex; align-items: baseline; gap: 4px; min-width: 0; flex: 1; }
        .r-value .vv  { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .r-value .vu  { flex-shrink: 0; color: var(--text-dim); text-align: right; }
        .r-navbtn {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,.15);
            font-weight: 600;
            overflow: hidden;
            cursor: pointer;
            transition: filter .15s;
        }
        .r-navbtn:hover { filter: brightness(1.2); }
        .r-indicator { position: absolute; inset: 0; border-radius: 50%; transition: background .3s; }
        .r-rect  { position: absolute; inset: 0; }
        .r-level { position: absolute; inset: 0; overflow: hidden; border-radius: 4px; }
        .r-level-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.9); pointer-events: none; }
        .r-gauge { position: absolute; inset: 0; overflow: hidden; }
        .r-ibox { position: absolute; inset: 0; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; border: 2px solid rgba(255,255,255,.12); transition: border-color .3s, filter .15s; }
        .r-ibox:hover { filter: brightness(1.12); }
        .r-ibox-bg { flex: 1; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .r-ibox-foot { padding: 3px 8px; background: rgba(0,0,0,.55); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .r-ibox-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
        .r-ibox-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── empty / loading states ── */
        .state-msg {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            color: var(--text-dim);
        }
        .state-msg .icon { font-size: 48px; opacity: .3; }
        .state-msg p { font-size: 15px; }

        /* ── footer ── */
        footer {
            height: var(--ftr-h);
            flex-shrink: 0;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 12px;
        }
        .ws-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ws-live    { background: #56d364; box-shadow: 0 0 6px #56d364; }
        .ws-conn    { background: #f0ad4e; }
        .ws-error   { background: #f47067; }
        .ftr-text   { font-size: 11px; color: var(--text-dim); }
        .ftr-right  { margin-left: auto; font-size: 11px; color: var(--text-dim); }
    </style>
</head>

<body @click="menuOpen && (menuOpen=false, menuPage='main'); userMenuOpen && (userMenuOpen=false)">

<!-- ═══════════ HEADER ═══════════ -->
<header>
    <a class="hdr-logo" href="/">⬡ Infrabox</a>
    <div class="hdr-sep"></div>

    <!-- back button (always left) -->
    <button class="hdr-back" x-show="history.length > 0"
            @click.stop="goBack()" title="Назад">←</button>

    <!-- title centered in remaining space -->
    <div class="hdr-breadcrumb">
        <span class="hdr-screen" x-text="screenTitle()"></span>
    </div>

    <!-- right side -->
    <div class="hdr-right">

        <!-- user -->
        <div class="user-wrap" @click.stop>
            <div class="hdr-user" @click="userMenuOpen=!userMenuOpen; settingsOpen=false">
                <div class="u-icon">👤</div>
                <span class="u-name" x-text="userName()"></span>
            </div>
            <div class="settings-drop" x-show="userMenuOpen" x-transition>
                <div class="sdrop-item" x-show="isLoggedIn" @click="logout(); userMenuOpen=false">
                    <span class="sdrop-icon">🚪</span> Вийти
                </div>
                <a class="sdrop-item" href="/login" x-show="!isLoggedIn">
                    <span class="sdrop-icon">🔑</span> Увійти
                </a>
            </div>
        </div>

        <div class="hdr-sep"></div>

        <!-- menu -->
        <div class="settings-wrap" @click.stop>
            <button class="btn" @click="menuOpen ? (menuOpen=false, menuPage='main') : (menuOpen=true); userMenuOpen=false"
                    style="gap:5px;display:flex;align-items:center;">
                ☰ Меню
            </button>
            <div class="settings-drop" x-show="menuOpen" x-transition style="min-width:200px">

                <!-- головна сторінка меню -->
                <template x-if="menuPage==='main'">
                    <div>
                        <div class="sdrop-item" @click="menuPage='settings'">
                            <span class="sdrop-icon">⚙</span> Налаштування
                            <span style="margin-left:auto;color:var(--text-dim);font-size:12px">›</span>
                        </div>
                        <div class="sdrop-sep"></div>
                        <a class="sdrop-item" href="/admin">
                            <span class="sdrop-icon">🛡</span> Адміністрування
                        </a>
                        <a class="sdrop-item" href="/constructor">
                            <span class="sdrop-icon">🔧</span> Конструктор
                        </a>
                        <div class="sdrop-sep"></div>
                        <label class="toggle-wrap" @click.stop>
                            <span class="sdrop-icon">☀</span>
                            Світла тема
                            <div class="toggle" style="margin-left:auto">
                                <input type="checkbox" :checked="theme==='light'" @change="toggleTheme()">
                                <div class="toggle-track"></div>
                                <div class="toggle-thumb"></div>
                            </div>
                        </label>
                        <div class="sdrop-sep"></div>
                        <a class="sdrop-item" href="/docs">
                            <span class="sdrop-icon">📄</span> Документація
                        </a>
                    </div>
                </template>

                <!-- сторінка налаштувань -->
                <template x-if="menuPage==='settings'">
                    <div>
                        <div class="sdrop-item" @click="menuPage='main'" style="color:var(--text-dim)">
                            <span class="sdrop-icon" style="font-size:13px">‹</span> Назад
                        </div>
                        <div class="sdrop-sep"></div>
                        <a class="sdrop-item" href="/dashboard">
                            <span class="sdrop-icon">📊</span> Всі параметри
                        </a>
                        <label class="toggle-wrap" @click.stop>
                            <span class="sdrop-icon">🤖</span>
                            Симулятор
                            <div class="toggle" style="margin-left:auto">
                                <input type="checkbox" :checked="simRunning" @change="toggleSimulator()">
                                <div class="toggle-track"></div>
                                <div class="toggle-thumb"></div>
                            </div>
                        </label>
                    </div>
                </template>

            </div>
        </div>

        <div class="hdr-sep"></div>

        <!-- clock (far right) -->
        <div class="hdr-clock">
            <div class="time" x-text="clock"></div>
            <div class="date" x-text="clockDate"></div>
        </div>
    </div>
</header>

<!-- ═══════════ MAIN ═══════════ -->
<main>
    <div id="canvas-area">

        <!-- loading -->
        <div class="state-msg" x-show="loading">
            <div class="icon">⏳</div>
            <p>Завантаження...</p>
        </div>

        <!-- no screens -->
        <div class="state-msg" x-show="!loading && !sc">
            <div class="icon">📋</div>
            <p>Екрани не налаштовані</p>
        </div>

        <!-- canvas -->
        <template x-if="sc">
            <div class="cv-wrap"
                 :style="`width:${sc.width*viewScale}px;height:${sc.height*viewScale}px;`">
                <div id="cv"
                     :style="`width:${sc.width}px;height:${sc.height}px;
                              background-color:${sc.bg};
                              background-image:${cvBgImage()};
                              background-size:100% 100%;
                              transform:scale(${viewScale});transform-origin:top left;`">

                    <template x-for="el in els" :key="el.id">
                        <div class="c-el"
                             :style="`left:${el.x*100}%;top:${el.y*100}%;
                                      width:${el.w*sc.width}px;height:${el.h*sc.height}px;`">

                            <!-- label -->
                            <template x-if="el.type==='label'">
                                <div class="r-label"
                                     :style="`font-size:${el.fontSize}px;color:${el.color};
                                              font-weight:${el.bold?'bold':'normal'};
                                              justify-content:${el.align==='center'?'center':el.align==='right'?'flex-end':'flex-start'};`"
                                     x-text="el.text"></div>
                            </template>

                            <!-- value -->
                            <template x-if="el.type==='value'">
                                <div class="r-value">
                                    <span class="vl" x-show="el.showLabel" x-text="el.label"
                                          :style="el.labelFontSize ? `font-size:${el.labelFontSize}px` : ''"></span>
                                    <div class="vrow">
                                        <span class="vv"
                                              :style="`font-size:${el.fontSize}px;color:${valueColor(el)};`"
                                              x-text="ptValue(el.point_id)"></span>
                                        <span class="vu" x-show="ptUnit(el.point_id)"
                                              :style="`font-size:${el.fontSize}px;`"
                                              x-text="ptUnit(el.point_id)"></span>
                                    </div>
                                </div>
                            </template>

                            <!-- nav_btn -->
                            <template x-if="el.type==='nav_btn'">
                                <div class="r-navbtn"
                                     :style="`background:${el.bg};color:${el.color};font-size:${el.fontSize}px;`"
                                     @click="navigate(el.target)"
                                     x-text="el.text"></div>
                            </template>

                            <!-- indicator -->
                            <template x-if="el.type==='indicator'">
                                <div class="r-indicator"
                                     :style="`background:${indicatorColor(el)};
                                              border:2px solid ${indicatorBorder(el)};`"></div>
                            </template>

                            <!-- rect -->
                            <template x-if="el.type==='rect'">
                                <div class="r-rect"
                                     :style="`background:${el.fill};
                                              border:${el.borderWidth}px solid ${el.borderColor};
                                              border-radius:${el.radius}px;
                                              opacity:${el.opacity??1};`"></div>
                            </template>

                            <!-- ibox_screen: підсистема зі станом параметра -->
                            <template x-if="el.type==='ibox_screen'">
                                <div class="r-ibox"
                                     :style="`border-color:${iboxBorderColor(el)};border-width:${el.borderWidth??2}px`"
                                     @click="navigate(el.target)">
                                    <div class="r-ibox-bg"
                                         :style="el.svgImage ? `background-image:url(${el.svgImage})` : 'background:rgba(88,166,255,.07)'"></div>
                                    <div class="r-ibox-foot">
                                        <div class="r-ibox-dot" :style="`background:${iboxDotColor(el)}`"></div>
                                        <span class="r-ibox-title"
                                              :style="`font-size:${el.fontSize}px;color:${el.color}`"
                                              x-text="el.title"></span>
                                    </div>
                                </div>
                            </template>

                            <!-- ibox_link: посилання на веб-сторінку -->
                            <template x-if="el.type==='ibox_link'">
                                <div class="r-ibox"
                                     :style="`border-color:rgba(255,255,255,.2);border-width:${el.borderWidth??2}px`"
                                     @click="openHref(el.href)">
                                    <div class="r-ibox-bg"
                                         :style="el.svgImage ? `background-image:url(${el.svgImage})` : 'background:rgba(80,255,160,.05)'"></div>
                                    <div class="r-ibox-foot">
                                        <span style="font-size:10px;color:#8b949e;flex-shrink:0">⇗</span>
                                        <span class="r-ibox-title"
                                              :style="`font-size:${el.fontSize}px;color:${el.color}`"
                                              x-text="el.title"></span>
                                    </div>
                                </div>
                            </template>

                            <!-- level_v / level_h: індикатор рівня рідини -->
                            <template x-if="el.type==='level_v'">
                                <div class="r-level" :style="`background:${el.bgColor};border:${el.borderWidth||1}px solid ${el.borderColor||'#30363d'};border-radius:${el.borderRadius??4}px`">
                                    <div :style="levelFillStyle(el)"></div>
                                    <div class="r-level-val" x-show="el.showValue"
                                         :style="`font-size:${el.fontSize||12}px;color:${el.color||'#fff'}`"
                                         x-text="ptValue(el.point_id) + (ptUnit(el.point_id) ? ' '+ptUnit(el.point_id) : '')"></div>
                                </div>
                            </template>
                            <template x-if="el.type==='level_h'">
                                <div class="r-level" :style="`background:${el.bgColor};border:${el.borderWidth||1}px solid ${el.borderColor||'#30363d'};border-radius:${el.borderRadius??4}px`">
                                    <div :style="levelFillStyle(el)"></div>
                                    <div class="r-level-val" x-show="el.showValue"
                                         :style="`font-size:${el.fontSize||12}px;color:${el.color||'#fff'}`"
                                         x-text="ptValue(el.point_id) + (ptUnit(el.point_id) ? ' '+ptUnit(el.point_id) : '')"></div>
                                </div>
                            </template>
                            <template x-if="el.type==='gauge'">
                                <div class="r-gauge"
                                     :style="`background:${el.bgColor};border:${el.borderWidth||0}px solid ${el.borderColor||'#30363d'};border-radius:${el.borderRadius??8}px`"
                                     x-html="gaugeSVGHtml(el)">
                                </div>
                            </template>

                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</main>

<!-- ═══════════ FOOTER ═══════════ -->
<footer>
    <div class="ws-dot" :class="{'ws-live':wsStatus==='live','ws-conn':wsStatus==='connecting','ws-error':wsStatus==='error'}"></div>
    <span class="ftr-text" x-text="wsStatus==='live'?'Live':'Підключення...'"></span>
    <span class="ftr-text" x-show="lastUpdate" x-text="`Оновлено: ${lastUpdate}`"></span>
    <span class="ftr-right" x-show="sc" x-text="`${sc?.width}×${sc?.height}`"></span>
</footer>

<script>
function app() {
    return {
        theme:       localStorage.getItem('ib-theme') || 'dark',
        isLoggedIn:  !!localStorage.getItem('token'),
        project:     { screens: [] },
        sc:          null,
        els:         [],
        points:      {},
        screenId:    null,
        history:     [],
        wsStatus:    'connecting',
        wsRetry:     0,
        loading:     true,
        clock:       '--:--:--',
        clockDate:   '',
        menuOpen:    false,
        menuPage:    'main',
        userMenuOpen: false,
        simRunning:  null,
        viewScale:   1,
        lastUpdate:  '',
        _ws:         null,

        async init() {
            this._startClock();
            this._connectWS();
            await this._loadProject();
            this._loadSimStatus();
            this.$nextTick(() => this._updateScale());
            window.addEventListener('resize', () => this._updateScale());
            window.addEventListener('beforeunload', () => {
                if (this._ws) { this._ws.onclose = null; this._ws.close(); }
            });
        },

        _startClock() {
            const tick = () => {
                const now = new Date();
                this.clock = now.toLocaleTimeString('uk-UA');
                this.clockDate = now.toLocaleDateString('uk-UA',
                    { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
            };
            tick();
            setInterval(tick, 1000);
        },

        async _loadProject() {
            try {
                const r = await fetch('/api/pub/project');
                if (r.ok) this.project = await r.json();
                await this.loadScreen('root');
            } catch(e) { console.error(e); }
            this.loading = false;
        },

        getScreenPath(id) {
            return id;  // плоска структура: screens/{id}/screen.json
        },

        async loadScreen(id) {
            if (!id) return;
            try {
                const path = this.getScreenPath(id);
                const r = await fetch(`/api/pub/screens/${path}`);
                if (!r.ok) return;
                const data = await r.json();
                this.sc  = data.screen;
                this.els = data.elements || [];
                this.screenId = id;
                this.$nextTick(() => this._updateScale());
            } catch(e) { console.error(e); }
        },

        async navigate(targetId) {
            if (!targetId) return;
            const target = this.project.screens.find(s => s.id === targetId);
            if (!target) return;
            this.history.push(this.screenId);
            await this.loadScreen(targetId);
        },

        async goBack() {
            if (!this.history.length) return;
            await this.loadScreen(this.history.pop());
        },

        _connectWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${proto}://${location.host}/ws`);
            this._ws = ws;
            this.wsStatus = 'connecting';

            ws.onopen  = () => { this.wsStatus = 'live'; this.wsRetry = 0; };
            ws.onclose = () => {
                this.wsStatus = 'error';
                const delay = Math.min(1000 * Math.pow(2, this.wsRetry++), 30000);
                setTimeout(() => this._connectWS(), delay);
            };
            ws.onerror = () => { this.wsStatus = 'error'; };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'snapshot') {
                    const pts = {};
                    msg.data.forEach(p => { pts[p.id] = p; });
                    this.points = pts;
                } else if (msg.type === 'update') {
                    const pts = { ...this.points };
                    msg.data.forEach(p => { pts[p.id] = p; });
                    this.points = pts;
                }
                const now = new Date();
                this.lastUpdate = now.toLocaleTimeString('uk-UA');
            };
        },

        _updateScale() {
            if (!this.sc) return;
            const area = document.getElementById('canvas-area');
            if (!area) return;
            const pad = 32;
            const aw = area.clientWidth  - pad;
            const ah = area.clientHeight - pad;
            this.viewScale = Math.min(aw / this.sc.width, ah / this.sc.height);
        },

        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('display_name');
            this.isLoggedIn = false;
        },

        userName() {
            return this.isLoggedIn
                ? (localStorage.getItem('display_name') || localStorage.getItem('role') || 'user')
                : 'operator';
        },

        toggleTheme() {
            this.theme = this.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('ib-theme', this.theme);
        },

        screenTitle() {
            if (!this.screenId) return 'Немає екранів';
            const s = this.project.screens.find(s => s.id === this.screenId);
            return s?.title || this.sc?.title || 'Екран';
        },

        cvBgImage() {
            return this.sc?.bgImage ? `url(${this.sc.bgImage})` : 'none';
        },

        // ── live data ──
        ptValue(id) {
            const p = this.points[id];
            if (!p || p.value == null) return '···';
            const v = parseFloat(p.value);
            return isNaN(v) ? p.value : v.toLocaleString('uk-UA', { maximumFractionDigits: 3 });
        },
        ptUnit(id)    { return this.points[id]?.unit    || ''; },
        ptQuality(id) { return this.points[id]?.quality || 'NODATA'; },

        _qColor(q, good) {
            return ({ GOOD:good, WARN:'#f0ad4e', ALARM:'#f47067',
                      UNCERT:'#8b949e', INIT:'#58a6ff', NODATA:'#484f58' })[q] || '#484f58';
        },
        valueColor(el)      { return this._qColor(this.ptQuality(el.point_id), el.color); },
        indicatorColor(el) {
            const q = this.ptQuality(el.point_id);
            return ({ GOOD: el.color,        WARN:  el.colorWarn  ||'#f0ad4e',
                      ALARM: el.colorAlarm  ||'#f47067', UNCERT: el.colorUncert||'#8b949e',
                      INIT: '#58a6ff', NODATA: '#484f58' })[q] || '#484f58';
        },
        indicatorBorder(el) {
            const q = this.ptQuality(el.point_id);
            return ({ GOOD: el.borderColor,            WARN:  el.borderColorWarn  ||el.colorWarn  ||'#f0ad4e',
                      ALARM: el.borderColorAlarm||el.colorAlarm||'#f47067', UNCERT: el.borderColorUncert||el.colorUncert||'#8b949e',
                      INIT: '#58a6ff', NODATA: '#333a42' })[q] || '#333a42';
        },
        _ptLim(pt, el, key) {
            // prefer Redis limits (written by core), fall back to element config
            const v = parseFloat(pt?.[key]);
            return isNaN(v) ? el[key] : v;
        },
        levelFillStyle(el) {
            const pt = this.points[String(el.point_id)];
            const v = parseFloat(pt?.value ?? NaN);
            const mn = this._ptLim(pt, el, 'min'), mx = this._ptLim(pt, el, 'max');
            const scale = isNaN(v) ? 0 : Math.min(1, Math.max(0, (v - mn) / ((mx - mn) || 1)));
            const q = this.ptQuality(el.point_id);
            const color = ({ GOOD: el.colorGood||'#56d364', WARN: el.colorWarn||'#f0ad4e',
                             ALARM: el.colorAlarm||'#f47067', UNCERT: el.colorWarn||'#f0ad4e',
                             INIT: '#58a6ff' })[q] || (el.colorGood||'#56d364');
            return el.type === 'level_v'
                ? `position:absolute;bottom:0;left:0;right:0;height:100%;background:${color};transform:scaleY(${scale});transform-origin:bottom center;transition:transform .4s`
                : `position:absolute;top:0;left:0;bottom:0;width:100%;background:${color};transform:scaleX(${scale});transform-origin:left center;transition:transform .4s`;
        },
        // ── gauge ─────────────────────────────────────────────────────────────
        _gaugeArcPath(cx, cy, r, a1, a2) {
            if (Math.abs(a2 - a1) < 0.1) return null;
            const rd = Math.PI / 180;
            const x1 = cx + r*Math.cos(a1*rd), y1 = cy + r*Math.sin(a1*rd);
            const x2 = cx + r*Math.cos(a2*rd), y2 = cy + r*Math.sin(a2*rd);
            const sw = ((a2 - a1) % 360 + 360) % 360;
            return `M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${sw>180?1:0} 1 ${x2.toFixed(2)},${y2.toFixed(2)}`;
        },
        _gaugeValAngle(mn, mx, v) {
            return 135 + Math.min(1, Math.max(0, (v - mn) / ((mx - mn) || 1))) * 270;
        },
        gaugeSVGHtml(el) {
            const pt = this.points[String(el.point_id)];
            const value = pt ? parseFloat(pt.value) : NaN;
            const unit = this.ptUnit(el.point_id);
            const cx=50, cy=56, r=36, aw=el.arcWidth||10, SA=135, EA=405;
            // use Redis limits if available — guaranteed to match core quality calculation
            const mn       = this._ptLim(pt, el, 'min');
            const mx       = this._ptLim(pt, el, 'max');
            const warn_min = this._ptLim(pt, el, 'warn_min');
            const warn_max = this._ptLim(pt, el, 'warn_max');
            const alarm_min= this._ptLim(pt, el, 'alarm_min');
            const alarm_max= this._ptLim(pt, el, 'alarm_max');
            const cG=el.colorGood||'#56d364', cW=el.colorWarn||'#f0ad4e', cA=el.colorAlarm||'#f47067';
            const aMin=Math.max(mn,alarm_min), wMin=Math.max(aMin,warn_min);
            const wMax=Math.min(mx,warn_max),  aMax=Math.min(mx,alarm_max);
            const zones=[];
            if(aMin>mn)   zones.push([mn,aMin,cA]);
            if(wMin>aMin) zones.push([aMin,wMin,cW]);
            zones.push([wMin,wMax,cG]);
            if(aMax>wMax) zones.push([wMax,aMax,cW]);
            if(mx>aMax)   zones.push([aMax,mx,cA]);
            const bgPath = this._gaugeArcPath(cx,cy,r,SA,EA);
            const zArcs = zones.map(([f,t,c])=>{
                const p=this._gaugeArcPath(cx,cy,r,this._gaugeValAngle(mn,mx,f),this._gaugeValAngle(mn,mx,t));
                return p?`<path d="${p}" fill="none" stroke="${c}" stroke-width="${aw}" stroke-linecap="butt"/>`:''
            }).join('');
            const safeVal = isNaN(value) ? mn : value;
            const ang = this._gaugeValAngle(mn,mx,safeVal) * Math.PI/180;
            const nLen = r-aw/2-2;
            const nx1=(cx-5*Math.cos(ang)).toFixed(2), ny1=(cy-5*Math.sin(ang)).toFixed(2);
            const nx2=(cx+nLen*Math.cos(ang)).toFixed(2), ny2=(cy+nLen*Math.sin(ang)).toFixed(2);
            const q = this.ptQuality(el.point_id);
            const nc = this._qColor(q, el.needleColor||'#e6edf3');
            const tc = this._qColor(q, el.color||'#e6edf3');
            const dispVal = isNaN(value)?'—':String(parseFloat(value.toFixed(2)));
            const disp = dispVal + (unit?' '+unit:'');
            const vTxt=el.showValue?`<text x="${cx}" y="${cy+r-4}" text-anchor="middle" fill="${tc}" font-size="${el.fontSize||13}" font-family="system-ui,sans-serif" font-weight="600">${disp}</text>`:'';
            const lTxt=el.label?`<text x="${cx}" y="12" text-anchor="middle" fill="${el.color||'#e6edf3'}" font-size="${el.labelFontSize||11}" font-family="system-ui,sans-serif" opacity="0.7">${el.label}</text>`:'';
            return `<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <path d="${bgPath}" fill="none" stroke="#21262d" stroke-width="${aw}" stroke-linecap="butt"/>
              ${zArcs}
              <line x1="${nx1}" y1="${ny1}" x2="${nx2}" y2="${ny2}" stroke="${nc}" stroke-width="2" stroke-linecap="round"/>
              <circle cx="${cx}" cy="${cy}" r="3.5" fill="${nc}"/>
              ${vTxt}${lTxt}</svg>`;
        },
        openHref(href) {
            if (!href) return;
            if (this._ws) { this._ws.onclose = null; this._ws.close(); }
            window.location.assign(href);
        },
        async _loadSimStatus() {
            try {
                const r = await fetch('/api/pub/simulator');
                const d = await r.json();
                this.simRunning = d.status === 'running';
            } catch {}
        },
        async toggleSimulator() {
            const action = this.simRunning ? 'stop' : 'start';
            try {
                const r = await fetch(`/api/pub/simulator/${action}`, { method: 'POST' });
                const d = await r.json();
                if (d.ok) this.simRunning = (action === 'start');
            } catch {}
        },
        iboxDotColor(el)    { return this._qColor(this.ptQuality(el.point_id), '#56d364'); },
        iboxBorderColor(el) {
            const q = this.ptQuality(el.point_id);
            return this._qColor(q, 'rgba(86,211,100,.6)');
        },
    };
}
</script>
