events {}

http {
    include      mime.types;
    default_type application/octet-stream;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS — єдина точка входу ─────────────────────────────────────────────
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/ssl/infrabox.crt;
        ssl_certificate_key /etc/nginx/ssl/infrabox.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Docker internal DNS — re-resolve upstreams dynamically
        resolver 127.0.0.11 valid=10s;

        # ── auth (core) ───────────────────────────────────────────────────────
        location /auth/ {
            set $up_auth infrabox-auth;
            proxy_pass         http://$up_auth:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── arch API ──────────────────────────────────────────────────────────
        # rewrite strips /arch/api/ prefix (required when proxy_pass uses variable)
        location /arch/api/ {
            set $up_arch_backend infrabox-arch-backend;
            rewrite ^/arch/api/(.*)$ /$1 break;
            proxy_pass           http://$up_arch_backend:8101;
            proxy_set_header     Host      $host;
            proxy_set_header     X-Real-IP $remote_addr;
            proxy_read_timeout   300s;
            proxy_send_timeout   300s;
        }

        # ── arch UI ───────────────────────────────────────────────────────────
        location = /arch { return 301 /arch/; }
        location /arch/ {
            set $up_arch_ui infrabox-arch-ui;
            rewrite ^/arch/(.*)$ /$1 break;
            proxy_pass         http://$up_arch_ui:80;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── adm API ───────────────────────────────────────────────────────────
        location /adm/api/ {
            set $up_adm infrabox-adm;
            rewrite ^/adm/api/(.*)$ /$1 break;
            proxy_pass         http://$up_adm:8099;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }

        # ── ui backend API ────────────────────────────────────────────────────
        location /api/ {
            set $up_backend infrabox-backend;
            proxy_pass         http://$up_backend:8090;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            set $up_backend_ws infrabox-backend;
            proxy_pass             http://$up_backend_ws:8090;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
        }

        # ── ui frontend ───────────────────────────────────────────────────────
        location = /login                 { rewrite ^ /login.html                 last; }
        location = /admin                 { rewrite ^ /admin.html                 last; }
        location = /constructor           { rewrite ^ /constructor-home.html      last; }
        location = /constructor-screens   { rewrite ^ /constructor.html           last; }
        location = /constructor-equipment { rewrite ^ /constructor-equipment.html last; }
        location = /dashboard             { rewrite ^ /dashboard.html             last; }
        location = /docs                  { rewrite ^ /docs.html                  last; }
        location = /redis-db              { rewrite ^ /redis-browser.html          last; }

        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
