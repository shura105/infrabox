events {}

http {
    include      mime.types;
    default_type application/octet-stream;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS — єдина точка входу ─────────────────────────────────────────────
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/ssl/infrabox.crt;
        ssl_certificate_key /etc/nginx/ssl/infrabox.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── auth (core) ───────────────────────────────────────────────────────
        location /auth/ {
            proxy_pass         http://infrabox-auth:8095/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── arch API ──────────────────────────────────────────────────────────
        location /arch/api/ {
            proxy_pass           http://infrabox-arch-backend:8101/;
            proxy_set_header     Host      $host;
            proxy_set_header     X-Real-IP $remote_addr;
            proxy_read_timeout   300s;
            proxy_send_timeout   300s;
        }

        # ── arch UI ───────────────────────────────────────────────────────────
        location = /arch { return 301 /arch/; }
        location /arch/ {
            proxy_pass         http://infrabox-arch-ui:80/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── adm API ───────────────────────────────────────────────────────────
        location /adm/api/ {
            proxy_pass         http://infrabox-adm:8099/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }

        # ── ui backend API ────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://infrabox-backend:8090/api/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            proxy_pass             http://infrabox-backend:8090/ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
        }

        # ── ui frontend ───────────────────────────────────────────────────────
        location = /login                 { rewrite ^ /login.html                 last; }
        location = /admin                 { rewrite ^ /admin.html                 last; }
        location = /constructor           { rewrite ^ /constructor-home.html      last; }
        location = /constructor-screens   { rewrite ^ /constructor.html           last; }
        location = /constructor-equipment { rewrite ^ /constructor-equipment.html last; }
        location = /dashboard             { rewrite ^ /dashboard.html             last; }
        location = /docs                  { rewrite ^ /docs.html                  last; }

        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
