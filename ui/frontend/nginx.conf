events {}

http {
    server {
        listen 80;

        # 🔹 фронтенд
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # 🔹 API
        location /api/ {
            proxy_pass http://infrabox-backend:8090;
        }

        # 🔹 WebSocket
        location /ws/ {
            proxy_pass http://infrabox-backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}